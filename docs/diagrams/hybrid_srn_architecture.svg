<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }

  @media (prefers-color-scheme: dark) {
    .auto .th, .auto .ts { fill: #e0e0e0; }
    .auto .bg { fill: #1a1a2e; }
    .auto .sub-text { fill: #999; }
    .auto .divider { stroke: #e0e0e0; }
    .auto .leader-line { stroke: #e0e0e0; }
    .auto .amber-fill { fill: #633806; stroke: #EF9F27; }
    .auto .amber-text { fill: #FAC775; }
    .auto .blue-fill { fill: #1A3A5C; stroke: #85B7EB; }
    .auto .blue-text { fill: #B8D8F8; }
  }
  @media (prefers-color-scheme: light) {
    .auto .th, .auto .ts { fill: #1a1a2e; }
    .auto .bg { fill: #ffffff; }
    .auto .sub-text { fill: #666; }
    .auto .divider { stroke: #1a1a2e; }
    .auto .leader-line { stroke: #1a1a2e; }
    .auto .amber-fill { fill: #FAEEDA; stroke: #BA7517; }
    .auto .amber-text { fill: #633806; }
    .auto .blue-fill { fill: #DCEEFB; stroke: #2D6DA3; }
    .auto .blue-text { fill: #1A3A5C; }
  }
</style>
<g class="auto">
<rect class="bg" x="0" y="0" width="680" height="560" rx="0"/>

<!-- Layer stack -->
<rect class="amber-fill" x="200" y="20" width="200" height="32" rx="6" stroke-width="0.5"/>
<text class="amber-text th" x="300" y="40" text-anchor="middle" dominant-baseline="central">Layer 0: Attention</text>

<rect class="blue-fill" x="200" y="58" width="200" height="32" rx="6" stroke-width="0.5"/>
<text class="blue-text ts" x="300" y="78" text-anchor="middle" dominant-baseline="central">Layer 1: Routing</text>

<rect class="blue-fill" x="200" y="96" width="200" height="32" rx="6" stroke-width="0.5"/>
<text class="blue-text ts" x="300" y="116" text-anchor="middle" dominant-baseline="central">Layer 2: Routing</text>

<rect class="blue-fill" x="200" y="134" width="200" height="32" rx="6" stroke-width="0.5"/>
<text class="blue-text ts" x="300" y="154" text-anchor="middle" dominant-baseline="central">Layer 3: Routing</text>

<rect class="amber-fill" x="200" y="178" width="200" height="32" rx="6" stroke-width="0.5"/>
<text class="amber-text th" x="300" y="198" text-anchor="middle" dominant-baseline="central">Layer 4: Attention</text>

<rect class="blue-fill" x="200" y="216" width="200" height="32" rx="6" stroke-width="0.5"/>
<text class="blue-text ts" x="300" y="236" text-anchor="middle" dominant-baseline="central">Layer 5: Routing</text>

<rect class="blue-fill" x="200" y="254" width="200" height="32" rx="6" stroke-width="0.5"/>
<text class="blue-text ts" x="300" y="274" text-anchor="middle" dominant-baseline="central">Layer 6: Routing</text>

<rect class="blue-fill" x="200" y="292" width="200" height="32" rx="6" stroke-width="0.5"/>
<text class="blue-text ts" x="300" y="312" text-anchor="middle" dominant-baseline="central">Layer 7: Routing</text>

<rect class="amber-fill" x="200" y="336" width="200" height="32" rx="6" stroke-width="0.5"/>
<text class="amber-text th" x="300" y="356" text-anchor="middle" dominant-baseline="central">Layer 8: Attention</text>

<rect class="blue-fill" x="200" y="374" width="200" height="32" rx="6" stroke-width="0.5"/>
<text class="blue-text ts" x="300" y="394" text-anchor="middle" dominant-baseline="central">Layer 9: Routing</text>

<rect class="blue-fill" x="200" y="412" width="200" height="32" rx="6" stroke-width="0.5"/>
<text class="blue-text ts" x="300" y="432" text-anchor="middle" dominant-baseline="central">Layer 10: Routing</text>

<rect class="blue-fill" x="200" y="450" width="200" height="32" rx="6" stroke-width="0.5"/>
<text class="blue-text ts" x="300" y="470" text-anchor="middle" dominant-baseline="central">Layer 11: Routing</text>

<!-- Right annotations -->
<text class="ts" x="420" y="40" text-anchor="start">Build initial representations</text>
<line class="leader-line" x1="400" y1="36" x2="416" y2="36" stroke-width="0.8" opacity="0.4"/>

<text class="ts" x="420" y="198" text-anchor="start">Periodic attention anchor</text>
<line class="leader-line" x1="400" y1="194" x2="416" y2="194" stroke-width="0.8" opacity="0.4"/>

<text class="ts" x="420" y="356" text-anchor="start">Correct routing drift</text>
<line class="leader-line" x1="400" y1="352" x2="416" y2="352" stroke-width="0.8" opacity="0.4"/>

<!-- Left annotations -->
<text class="sub-text ts" x="180" y="116" text-anchor="end">O(n·k)</text>
<text class="sub-text ts" x="180" y="40" text-anchor="end">O(n²)</text>

<!-- Summary stats -->
<line class="divider" x1="40" y1="500" x2="640" y2="500" stroke-width="0.5" opacity="0.15"/>

<text class="ts" x="120" y="528" text-anchor="middle">75% routing layers</text>
<text class="sub-text ts" x="120" y="544" text-anchor="middle">cheap, O(n·k)</text>

<text class="ts" x="340" y="528" text-anchor="middle">25% attention layers</text>
<text class="sub-text ts" x="340" y="544" text-anchor="middle">expressive, O(n²)</text>

<text class="ts" x="560" y="528" text-anchor="middle">Same as Qwen 3.5</text>
<text class="sub-text ts" x="560" y="544" text-anchor="middle">3:1 hybrid ratio</text>

</g>
</svg>
