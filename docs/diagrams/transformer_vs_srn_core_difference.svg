<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }

  @media (prefers-color-scheme: dark) {
    .auto .th, .auto .ts { fill: #e0e0e0; }
    .auto .bg { fill: #1a1a2e; }
    .auto .sub-text { fill: #999; }
    .auto .fg-line { stroke: #e0e0e0; }
    .auto .divider { stroke: #e0e0e0; }
    .auto .coral-fill { fill: #791F1F; stroke: #F09595; }
    .auto .coral-text { fill: #F7C1C1; }
    .auto .teal-fill { fill: #085041; stroke: #5DCAA5; }
    .auto .teal-text { fill: #9FE1CB; }
    .auto .purple-fill { fill: #3C3489; stroke: #AFA9EC; }
    .auto .purple-text { fill: #CECBF6; }
  }
  @media (prefers-color-scheme: light) {
    .auto .th, .auto .ts { fill: #1a1a2e; }
    .auto .bg { fill: #ffffff; }
    .auto .sub-text { fill: #666; }
    .auto .fg-line { stroke: #1a1a2e; }
    .auto .divider { stroke: #1a1a2e; }
    .auto .coral-fill { fill: #FCEBEB; stroke: #A32D2D; }
    .auto .coral-text { fill: #791F1F; }
    .auto .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
    .auto .teal-text { fill: #085041; }
    .auto .purple-fill { fill: #EEEDFE; stroke: #534AB7; }
    .auto .purple-text { fill: #3C3489; }
  }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<g class="auto">
<rect class="bg" x="0" y="0" width="680" height="520" rx="0"/>

<!-- Left: Transformer -->
<text class="th" x="170" y="36" text-anchor="middle">Transformer</text>
<text class="ts" x="170" y="54" text-anchor="middle">Self-attention: O(n²·d)</text>

<!-- Token row left -->
<circle class="coral-fill" cx="80" cy="100" r="14" stroke-width="0.5"/>
<circle class="coral-fill" cx="120" cy="100" r="14" stroke-width="0.5"/>
<circle class="coral-fill" cx="160" cy="100" r="14" stroke-width="0.5"/>
<circle class="coral-fill" cx="200" cy="100" r="14" stroke-width="0.5"/>
<circle class="coral-fill" cx="240" cy="100" r="14" stroke-width="0.5"/>

<!-- n² connections (every token to every token) -->
<line x1="80" y1="114" x2="80" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="80" y1="114" x2="120" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="80" y1="114" x2="160" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="80" y1="114" x2="200" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="80" y1="114" x2="240" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>

<line x1="120" y1="114" x2="80" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="120" y1="114" x2="120" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="120" y1="114" x2="160" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="120" y1="114" x2="200" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="120" y1="114" x2="240" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>

<line x1="160" y1="114" x2="80" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="160" y1="114" x2="120" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="160" y1="114" x2="160" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="160" y1="114" x2="200" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="160" y1="114" x2="240" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>

<line x1="200" y1="114" x2="80" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="200" y1="114" x2="120" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="200" y1="114" x2="160" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="200" y1="114" x2="200" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="200" y1="114" x2="240" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>

<line x1="240" y1="114" x2="80" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="240" y1="114" x2="120" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="240" y1="114" x2="160" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="240" y1="114" x2="200" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>
<line x1="240" y1="114" x2="240" y2="186" stroke="#999" stroke-width="0.4" opacity="0.3"/>

<!-- Output tokens left -->
<circle class="coral-fill" cx="80" cy="200" r="14" stroke-width="0.5"/>
<circle class="coral-fill" cx="120" cy="200" r="14" stroke-width="0.5"/>
<circle class="coral-fill" cx="160" cy="200" r="14" stroke-width="0.5"/>
<circle class="coral-fill" cx="200" cy="200" r="14" stroke-width="0.5"/>
<circle class="coral-fill" cx="240" cy="200" r="14" stroke-width="0.5"/>

<text class="ts" x="170" y="240" text-anchor="middle">Every token talks to every token</text>
<text class="ts" x="170" y="256" text-anchor="middle">25 connections for 5 tokens</text>

<!-- Divider -->
<line class="divider" x1="340" y1="20" x2="340" y2="280" stroke-width="0.5" opacity="0.2"/>

<!-- Right: SRN -->
<text class="th" x="510" y="36" text-anchor="middle">SRN</text>
<text class="ts" x="510" y="54" text-anchor="middle">Slot routing: O(n·k·d)</text>

<!-- Token row right -->
<circle class="teal-fill" cx="420" cy="200" r="14" stroke-width="0.5"/>
<circle class="teal-fill" cx="460" cy="200" r="14" stroke-width="0.5"/>
<circle class="teal-fill" cx="500" cy="200" r="14" stroke-width="0.5"/>
<circle class="teal-fill" cx="540" cy="200" r="14" stroke-width="0.5"/>
<circle class="teal-fill" cx="580" cy="200" r="14" stroke-width="0.5"/>

<!-- Memory slots -->
<rect class="purple-fill" x="430" y="86" width="36" height="28" rx="4" stroke-width="0.5"/>
<text class="purple-text ts" x="448" y="104" text-anchor="middle">S1</text>
<rect class="purple-fill" x="476" y="86" width="36" height="28" rx="4" stroke-width="0.5"/>
<text class="purple-text ts" x="494" y="104" text-anchor="middle">S2</text>
<rect class="purple-fill" x="522" y="86" width="36" height="28" rx="4" stroke-width="0.5"/>
<text class="purple-text ts" x="540" y="104" text-anchor="middle">S3</text>
<rect class="purple-fill" x="568" y="86" width="36" height="28" rx="4" stroke-width="0.5"/>
<text class="purple-text ts" x="586" y="104" text-anchor="middle">S4</text>

<!-- Sparse routing (each token picks 2 slots) -->
<line x1="420" y1="186" x2="448" y2="114" stroke="#1D9E75" stroke-width="1" opacity="0.6"/>
<line x1="420" y1="186" x2="540" y2="114" stroke="#1D9E75" stroke-width="1" opacity="0.6"/>

<line x1="460" y1="186" x2="448" y2="114" stroke="#1D9E75" stroke-width="1" opacity="0.6"/>
<line x1="460" y1="186" x2="494" y2="114" stroke="#1D9E75" stroke-width="1" opacity="0.6"/>

<line x1="500" y1="186" x2="494" y2="114" stroke="#1D9E75" stroke-width="1" opacity="0.6"/>
<line x1="500" y1="186" x2="586" y2="114" stroke="#1D9E75" stroke-width="1" opacity="0.6"/>

<line x1="540" y1="186" x2="540" y2="114" stroke="#1D9E75" stroke-width="1" opacity="0.6"/>
<line x1="540" y1="186" x2="448" y2="114" stroke="#1D9E75" stroke-width="1" opacity="0.6"/>

<line x1="580" y1="186" x2="586" y2="114" stroke="#1D9E75" stroke-width="1" opacity="0.6"/>
<line x1="580" y1="186" x2="494" y2="114" stroke="#1D9E75" stroke-width="1" opacity="0.6"/>

<text class="ts" x="510" y="240" text-anchor="middle">Each token routes to 2 memory slots</text>
<text class="ts" x="510" y="256" text-anchor="middle">10 connections for 5 tokens</text>

<!-- Scale comparison section -->
<line class="divider" x1="40" y1="290" x2="640" y2="290" stroke-width="0.5" opacity="0.15"/>
<text class="th" x="340" y="320" text-anchor="middle">At scale: connections at different sequence lengths</text>

<!-- Bar chart -->
<!-- n=1K -->
<text class="ts" x="100" y="360" text-anchor="middle">n = 1K</text>
<rect class="coral-fill" x="60" y="370" width="36" height="80" rx="4" stroke-width="0.5"/>
<rect class="teal-fill" x="104" y="430" width="36" height="20" rx="4" stroke-width="0.5"/>
<text class="ts" x="78" y="464" text-anchor="middle">1M</text>
<text class="ts" x="122" y="464" text-anchor="middle">64K</text>

<!-- n=8K -->
<text class="ts" x="240" y="360" text-anchor="middle">n = 8K</text>
<rect class="coral-fill" x="200" y="370" width="36" height="120" rx="4" stroke-width="0.5"/>
<rect class="teal-fill" x="244" y="440" width="36" height="10" rx="4" stroke-width="0.5"/>
<text class="ts" x="218" y="504" text-anchor="middle">64M</text>
<text class="ts" x="262" y="464" text-anchor="middle">512K</text>

<!-- n=32K -->
<text class="ts" x="400" y="360" text-anchor="middle">n = 32K</text>
<rect class="coral-fill" x="360" y="370" width="36" height="120" rx="4" stroke-width="0.5"/>
<rect class="teal-fill" x="404" y="444" width="36" height="6" rx="3" stroke-width="0.5"/>
<text class="ts" x="378" y="504" text-anchor="middle">1B</text>
<text class="ts" x="422" y="464" text-anchor="middle">2M</text>

<!-- n=128K -->
<text class="ts" x="560" y="360" text-anchor="middle">n = 128K</text>
<rect class="coral-fill" x="520" y="370" width="36" height="120" rx="4" stroke-width="0.5"/>
<rect class="teal-fill" x="564" y="446" width="36" height="4" rx="2" stroke-width="0.5"/>
<text class="ts" x="538" y="504" text-anchor="middle">16B</text>
<text class="ts" x="582" y="464" text-anchor="middle">8M</text>

</g>
</svg>
