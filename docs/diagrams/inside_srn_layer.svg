<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }

  @media (prefers-color-scheme: dark) {
    .auto .th, .auto .ts { fill: #e0e0e0; }
    .auto .bg { fill: #1a1a2e; }
    .auto .sub-text { fill: #999; }
    .auto .fg-line { stroke: #e0e0e0; }
    .auto .gray-fill { fill: #2C2C2A; stroke: #5F5E5A; }
    .auto .gray-text { fill: #B4B2A9; }
    .auto .blue-fill { fill: #1A3A5C; stroke: #85B7EB; }
    .auto .blue-text { fill: #B8D8F8; }
    .auto .purple-fill { fill: #3C3489; stroke: #AFA9EC; }
    .auto .purple-text { fill: #CECBF6; }
    .auto .green-fill { fill: #1B4D1B; stroke: #81c784; }
    .auto .green-text { fill: #B8E6BA; }
  }
  @media (prefers-color-scheme: light) {
    .auto .th, .auto .ts { fill: #1a1a2e; }
    .auto .bg { fill: #ffffff; }
    .auto .sub-text { fill: #666; }
    .auto .fg-line { stroke: #1a1a2e; }
    .auto .gray-fill { fill: #F1EFE8; stroke: #888780; }
    .auto .gray-text { fill: #444441; }
    .auto .blue-fill { fill: #DCEEFB; stroke: #2D6DA3; }
    .auto .blue-text { fill: #1A3A5C; }
    .auto .purple-fill { fill: #EEEDFE; stroke: #534AB7; }
    .auto .purple-text { fill: #3C3489; }
    .auto .green-fill { fill: #E8F5E9; stroke: #388E3C; }
    .auto .green-text { fill: #1B5E20; }
  }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<g class="auto">
<rect class="bg" x="0" y="0" width="680" height="620" rx="0"/>

<!-- Input -->
<rect class="gray-fill" x="270" y="20" width="140" height="36" rx="8" stroke-width="0.5"/>
<text class="gray-text th" x="340" y="38" text-anchor="middle" dominant-baseline="central">Input x</text>

<!-- Arrow down to DSR -->
<line class="fg-line" x1="340" y1="56" x2="340" y2="90" stroke-width="1" marker-end="url(#arrow)"/>

<!-- DSR Module -->
<rect class="blue-fill" x="200" y="90" width="280" height="110" rx="8" stroke-width="0.5"/>
<text class="blue-text th" x="340" y="114" text-anchor="middle" dominant-baseline="central">Dynamic sparse router</text>
<text class="blue-text ts" x="340" y="134" text-anchor="middle" dominant-baseline="central">Where should this token look?</text>

<!-- Mini slot routing illustration inside DSR -->
<circle cx="250" cy="172" r="6" fill="#85B7EB" opacity="0.7"/>
<circle cx="280" cy="172" r="6" fill="#85B7EB" opacity="0.7"/>
<circle cx="310" cy="172" r="6" fill="#85B7EB" opacity="0.7"/>
<line x1="250" y1="166" x2="370" y2="158" stroke="#85B7EB" stroke-width="0.8" opacity="0.5"/>
<line x1="250" y1="166" x2="400" y2="158" stroke="#85B7EB" stroke-width="0.8" opacity="0.5"/>
<line x1="280" y1="166" x2="370" y2="158" stroke="#85B7EB" stroke-width="0.8" opacity="0.5"/>
<line x1="280" y1="166" x2="430" y2="158" stroke="#85B7EB" stroke-width="0.8" opacity="0.5"/>
<line x1="310" y1="166" x2="400" y2="158" stroke="#85B7EB" stroke-width="0.8" opacity="0.5"/>
<line x1="310" y1="166" x2="430" y2="158" stroke="#85B7EB" stroke-width="0.8" opacity="0.5"/>
<rect x="360" y="150" width="24" height="16" rx="3" fill="#AFA9EC" opacity="0.6"/>
<rect x="390" y="150" width="24" height="16" rx="3" fill="#AFA9EC" opacity="0.6"/>
<rect x="420" y="150" width="24" height="16" rx="3" fill="#AFA9EC" opacity="0.6"/>

<!-- DSR label -->
<text class="sub-text ts" x="580" y="140" text-anchor="start">O(n·k·d)</text>

<!-- Residual bypass for DSR -->
<path d="M200 138 L170 138 L170 212 L270 212" fill="none" stroke="#999" stroke-width="0.8" opacity="0.4" stroke-dasharray="4 3"/>
<text class="sub-text ts" x="156" y="178" text-anchor="end">+</text>

<!-- Arrow down to CSP -->
<line class="fg-line" x1="340" y1="200" x2="340" y2="250" stroke-width="1" marker-end="url(#arrow)"/>

<!-- CSP Module -->
<rect class="purple-fill" x="200" y="250" width="280" height="110" rx="8" stroke-width="0.5"/>
<text class="purple-text th" x="340" y="274" text-anchor="middle" dominant-baseline="central">Compressed state propagation</text>
<text class="purple-text ts" x="340" y="294" text-anchor="middle" dominant-baseline="central">What info is worth keeping?</text>

<!-- Bottleneck illustration inside CSP -->
<rect x="240" y="314" width="60" height="20" rx="4" fill="#AFA9EC" opacity="0.5"/>
<text class="purple-text ts" x="270" y="328" text-anchor="middle" dominant-baseline="central">D</text>
<rect x="320" y="318" width="30" height="12" rx="3" fill="#ce93d8" opacity="0.7"/>
<text class="purple-text ts" x="335" y="328" text-anchor="middle" dominant-baseline="central">D/4</text>
<rect x="370" y="314" width="60" height="20" rx="4" fill="#AFA9EC" opacity="0.5"/>
<text class="purple-text ts" x="400" y="328" text-anchor="middle" dominant-baseline="central">D</text>
<line x1="300" y1="324" x2="318" y2="324" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5" marker-end="url(#arrow)"/>
<line x1="352" y1="324" x2="368" y2="324" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5" marker-end="url(#arrow)"/>

<!-- Residual bypass for CSP -->
<path d="M200 298 L170 298 L170 372 L270 372" fill="none" stroke="#999" stroke-width="0.8" opacity="0.4" stroke-dasharray="4 3"/>
<text class="sub-text ts" x="156" y="338" text-anchor="end">+</text>

<!-- Arrow down to GEM -->
<line class="fg-line" x1="340" y1="360" x2="340" y2="410" stroke-width="1" marker-end="url(#arrow)"/>

<!-- GEM Module -->
<rect class="green-fill" x="200" y="410" width="280" height="110" rx="8" stroke-width="0.5"/>
<text class="green-text th" x="340" y="434" text-anchor="middle" dominant-baseline="central">Gated expert mixture</text>
<text class="green-text ts" x="340" y="454" text-anchor="middle" dominant-baseline="central">Process with specialist FFNs</text>

<!-- Expert boxes inside GEM -->
<rect x="224" y="474" width="26" height="20" rx="3" fill="#97C459" opacity="0.8"/>
<rect x="256" y="474" width="26" height="20" rx="3" fill="#97C459" opacity="0.8"/>
<rect x="288" y="474" width="26" height="20" rx="3" fill="#555" opacity="0.12"/>
<rect x="320" y="474" width="26" height="20" rx="3" fill="#555" opacity="0.12"/>
<rect x="352" y="474" width="26" height="20" rx="3" fill="#555" opacity="0.12"/>
<rect x="384" y="474" width="26" height="20" rx="3" fill="#555" opacity="0.12"/>
<rect x="416" y="474" width="26" height="20" rx="3" fill="#555" opacity="0.12"/>
<rect x="448" y="474" width="26" height="20" rx="3" fill="#555" opacity="0.12"/>

<!-- GEM label -->
<text class="sub-text ts" x="580" y="488" text-anchor="start">2 of 8 active</text>

<!-- Residual bypass for GEM -->
<path d="M200 458 L170 458 L170 532 L270 532" fill="none" stroke="#999" stroke-width="0.8" opacity="0.4" stroke-dasharray="4 3"/>
<text class="sub-text ts" x="156" y="498" text-anchor="end">+</text>

<!-- Arrow to output -->
<line class="fg-line" x1="340" y1="520" x2="340" y2="556" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Output -->
<rect class="gray-fill" x="270" y="556" width="140" height="36" rx="8" stroke-width="0.5"/>
<text class="gray-text th" x="340" y="574" text-anchor="middle" dominant-baseline="central">Output x</text>

<!-- Repeat indicator -->
<text class="sub-text ts" x="580" y="574" text-anchor="start">×8 layers</text>

</g>
</svg>
