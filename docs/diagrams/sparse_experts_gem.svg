<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }

  @media (prefers-color-scheme: dark) {
    .auto .th, .auto .ts { fill: #e0e0e0; }
    .auto .bg { fill: #1a1a2e; }
    .auto .sub-text { fill: #999; }
    .auto .divider { stroke: #e0e0e0; }
    .auto .amber-fill { fill: #633806; stroke: #EF9F27; }
    .auto .amber-text { fill: #FAC775; }
    .auto .gray-fill { fill: #2C2C2A; stroke: #5F5E5A; }
    .auto .gray-text { fill: #B4B2A9; }
    .auto .green-fill { fill: #1B4D1B; stroke: #81c784; }
    .auto .green-text { fill: #B8E6BA; }
    .auto .inactive-fill { fill: #2C2C2A; stroke: #444; }
    .auto .inactive-text { fill: #666; }
  }
  @media (prefers-color-scheme: light) {
    .auto .th, .auto .ts { fill: #1a1a2e; }
    .auto .bg { fill: #ffffff; }
    .auto .sub-text { fill: #666; }
    .auto .divider { stroke: #1a1a2e; }
    .auto .amber-fill { fill: #FAEEDA; stroke: #BA7517; }
    .auto .amber-text { fill: #633806; }
    .auto .gray-fill { fill: #F1EFE8; stroke: #888780; }
    .auto .gray-text { fill: #444441; }
    .auto .green-fill { fill: #E8F5E9; stroke: #388E3C; }
    .auto .green-text { fill: #1B5E20; }
    .auto .inactive-fill { fill: #F5F5F5; stroke: #CCC; }
    .auto .inactive-text { fill: #BBB; }
  }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="auto">
<rect class="bg" x="0" y="0" width="680" height="480" rx="0"/>

<!-- Input token -->
<rect class="amber-fill" x="40" y="62" width="80" height="36" rx="8" stroke-width="0.5"/>
<text class="amber-text th" x="80" y="80" text-anchor="middle" dominant-baseline="central">Token</text>

<!-- Arrow to router -->
<line x1="120" y1="80" x2="160" y2="80" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Router -->
<rect class="gray-fill" x="162" y="62" width="80" height="36" rx="8" stroke-width="0.5"/>
<text class="gray-text th" x="202" y="80" text-anchor="middle" dominant-baseline="central">Router</text>

<!-- Arrows from router to active experts -->
<line x1="242" y1="72" x2="296" y2="46" stroke="#639922" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="242" y1="88" x2="296" y2="106" stroke="#639922" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Arrows from router to inactive (grayed) -->
<line x1="242" y1="80" x2="370" y2="46" stroke="#999" stroke-width="0.5" opacity="0.15" marker-end="url(#arrow)"/>
<line x1="242" y1="80" x2="370" y2="106" stroke="#999" stroke-width="0.5" opacity="0.15" marker-end="url(#arrow)"/>
<line x1="242" y1="80" x2="444" y2="46" stroke="#999" stroke-width="0.5" opacity="0.15" marker-end="url(#arrow)"/>
<line x1="242" y1="80" x2="444" y2="106" stroke="#999" stroke-width="0.5" opacity="0.15" marker-end="url(#arrow)"/>
<line x1="242" y1="80" x2="518" y2="46" stroke="#999" stroke-width="0.5" opacity="0.15" marker-end="url(#arrow)"/>
<line x1="242" y1="80" x2="518" y2="106" stroke="#999" stroke-width="0.5" opacity="0.15" marker-end="url(#arrow)"/>

<!-- Expert boxes row 1 -->
<rect class="green-fill" x="298" y="26" width="60" height="36" rx="6" stroke-width="0.5"/>
<text class="green-text th" x="328" y="48" text-anchor="middle" dominant-baseline="central">E1</text>
<rect class="inactive-fill" x="372" y="26" width="60" height="36" rx="6" stroke-width="0.5"/>
<text class="inactive-text ts" x="402" y="48" text-anchor="middle" dominant-baseline="central">E2</text>
<rect class="inactive-fill" x="446" y="26" width="60" height="36" rx="6" stroke-width="0.5"/>
<text class="inactive-text ts" x="476" y="48" text-anchor="middle" dominant-baseline="central">E3</text>
<rect class="inactive-fill" x="520" y="26" width="60" height="36" rx="6" stroke-width="0.5"/>
<text class="inactive-text ts" x="550" y="48" text-anchor="middle" dominant-baseline="central">E4</text>

<!-- Expert boxes row 2 -->
<rect class="green-fill" x="298" y="86" width="60" height="36" rx="6" stroke-width="0.5"/>
<text class="green-text th" x="328" y="108" text-anchor="middle" dominant-baseline="central">E5</text>
<rect class="inactive-fill" x="372" y="86" width="60" height="36" rx="6" stroke-width="0.5"/>
<text class="inactive-text ts" x="402" y="108" text-anchor="middle" dominant-baseline="central">E6</text>
<rect class="inactive-fill" x="446" y="86" width="60" height="36" rx="6" stroke-width="0.5"/>
<text class="inactive-text ts" x="476" y="108" text-anchor="middle" dominant-baseline="central">E7</text>
<rect class="inactive-fill" x="520" y="86" width="60" height="36" rx="6" stroke-width="0.5"/>
<text class="inactive-text ts" x="550" y="108" text-anchor="middle" dominant-baseline="central">E8</text>

<!-- Combine outputs -->
<line x1="358" y1="44" x2="616" y2="72" stroke="#639922" stroke-width="1" opacity="0.6" marker-end="url(#arrow)"/>
<line x1="358" y1="104" x2="616" y2="88" stroke="#639922" stroke-width="1" opacity="0.6" marker-end="url(#arrow)"/>
<rect class="gray-fill" x="618" y="62" width="44" height="36" rx="8" stroke-width="0.5"/>
<text class="gray-text th" x="640" y="80" text-anchor="middle" dominant-baseline="central">Σ</text>

<!-- Divider -->
<line class="divider" x1="40" y1="160" x2="640" y2="160" stroke-width="0.5" opacity="0.15"/>

<!-- Different tokens, different experts -->
<text class="th" x="340" y="190" text-anchor="middle">Different tokens activate different expert pairs</text>

<!-- Token A -->
<rect class="amber-fill" x="50" y="220" width="72" height="30" rx="6" stroke-width="0.5"/>
<text class="amber-text ts" x="86" y="239" text-anchor="middle" dominant-baseline="central">"The"</text>
<rect class="green-fill" x="146" y="216" width="30" height="18" rx="4" stroke-width="0.5"/>
<text class="green-text ts" x="161" y="229" text-anchor="middle" dominant-baseline="central">1</text>
<rect class="green-fill" x="182" y="216" width="30" height="18" rx="4" stroke-width="0.5"/>
<text class="green-text ts" x="197" y="229" text-anchor="middle" dominant-baseline="central">5</text>
<rect class="inactive-fill" x="218" y="216" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="inactive-fill" x="254" y="216" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="inactive-fill" x="290" y="216" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="inactive-fill" x="326" y="216" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="inactive-fill" x="362" y="216" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="inactive-fill" x="398" y="216" width="30" height="18" rx="4" stroke-width="0.3"/>

<!-- Token B -->
<rect class="amber-fill" x="50" y="264" width="72" height="30" rx="6" stroke-width="0.5"/>
<text class="amber-text ts" x="86" y="283" text-anchor="middle" dominant-baseline="central">"cat"</text>
<rect class="inactive-fill" x="146" y="260" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="inactive-fill" x="182" y="260" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="green-fill" x="218" y="260" width="30" height="18" rx="4" stroke-width="0.5"/>
<text class="green-text ts" x="233" y="273" text-anchor="middle" dominant-baseline="central">3</text>
<rect class="inactive-fill" x="254" y="260" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="inactive-fill" x="290" y="260" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="inactive-fill" x="326" y="260" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="green-fill" x="362" y="260" width="30" height="18" rx="4" stroke-width="0.5"/>
<text class="green-text ts" x="377" y="273" text-anchor="middle" dominant-baseline="central">7</text>
<rect class="inactive-fill" x="398" y="260" width="30" height="18" rx="4" stroke-width="0.3"/>

<!-- Token C -->
<rect class="amber-fill" x="50" y="308" width="72" height="30" rx="6" stroke-width="0.5"/>
<text class="amber-text ts" x="86" y="327" text-anchor="middle" dominant-baseline="central">"sat"</text>
<rect class="inactive-fill" x="146" y="304" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="green-fill" x="182" y="304" width="30" height="18" rx="4" stroke-width="0.5"/>
<text class="green-text ts" x="197" y="317" text-anchor="middle" dominant-baseline="central">2</text>
<rect class="inactive-fill" x="218" y="304" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="inactive-fill" x="254" y="304" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="inactive-fill" x="290" y="304" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="green-fill" x="326" y="304" width="30" height="18" rx="4" stroke-width="0.5"/>
<text class="green-text ts" x="341" y="317" text-anchor="middle" dominant-baseline="central">6</text>
<rect class="inactive-fill" x="362" y="304" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="inactive-fill" x="398" y="304" width="30" height="18" rx="4" stroke-width="0.3"/>

<!-- Token D -->
<rect class="amber-fill" x="50" y="352" width="72" height="30" rx="6" stroke-width="0.5"/>
<text class="amber-text ts" x="86" y="371" text-anchor="middle" dominant-baseline="central">"on"</text>
<rect class="green-fill" x="146" y="348" width="30" height="18" rx="4" stroke-width="0.5"/>
<text class="green-text ts" x="161" y="361" text-anchor="middle" dominant-baseline="central">1</text>
<rect class="inactive-fill" x="182" y="348" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="inactive-fill" x="218" y="348" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="green-fill" x="254" y="348" width="30" height="18" rx="4" stroke-width="0.5"/>
<text class="green-text ts" x="269" y="361" text-anchor="middle" dominant-baseline="central">4</text>
<rect class="inactive-fill" x="290" y="348" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="inactive-fill" x="326" y="348" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="inactive-fill" x="362" y="348" width="30" height="18" rx="4" stroke-width="0.3"/>
<rect class="inactive-fill" x="398" y="348" width="30" height="18" rx="4" stroke-width="0.3"/>

<!-- Labels -->
<text class="ts" x="455" y="229" text-anchor="start">E1, E5</text>
<text class="ts" x="455" y="273" text-anchor="start">E3, E7</text>
<text class="ts" x="455" y="317" text-anchor="start">E2, E6</text>
<text class="ts" x="455" y="361" text-anchor="start">E1, E4</text>

<!-- Summary -->
<text class="ts" x="340" y="410" text-anchor="middle">Each token uses 25% of the FFN compute.</text>
<text class="ts" x="340" y="428" text-anchor="middle">Across a batch, all 8 experts get used — full capacity, fractional cost.</text>

</g>
</svg>
