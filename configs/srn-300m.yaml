train:
  max_steps: 30000
  micro_batch: 4
  accum_steps: 8
  seq_len: 2048
  max_lr: 0.00015
  min_lr: 0.000015
  weight_decay: 0.1
  warmup_steps: 1500
  max_grad_norm: 1.0
  eval_interval: 750
  eval_batches: 20
  log_interval: 50
  checkpoint_dir: checkpoints/srn-300m
  seed: 42

model:
  max_seq_len: 2048
  d_model: 1280
  d_compressed: 320
  n_layers: 14
  n_memory_slots: 128
  n_experts: 8
  top_k_experts: 2
  d_expert: 512
  n_heads_route: 8
  dropout: 0.1
  causal_window: 128
  csp_internal_residual: false
  aux_loss_weight: 0.01
  sparse_moe: true
