train:
  max_steps: 50000
  micro_batch: 2
  accum_steps: 16
  seq_len: 2048
  max_lr: 0.00012
  min_lr: 0.000012
  weight_decay: 0.1
  warmup_steps: 2000
  max_grad_norm: 1.0
  eval_interval: 1000
  eval_batches: 20
  log_interval: 100
  checkpoint_dir: checkpoints/dense-067b
  seed: 42
  model_type: dense

model:
  max_seq_len: 2048
  d_model: 1536
  n_layers: 20
  n_heads: 16
  d_ff: 6144
  dropout: 0.1
  bias: false
