# Dense Transformer 411M — Compute-fair baseline for 1B SRN comparison
#
# ~411M total params (all active) vs SRN hybrid's ~406M active params per token.
# This is a fair compute-per-token comparison: similar FLOPs per forward pass.
# The SRN has ~956M total params but only ~406M are active per token due to
# sparse expert routing (top-k=2 of 16 experts).
#
# Sizing: d_model=1152, n_layers=22, d_ff=4608 (4x), n_heads=16 (head_dim=72)
# Slightly generous to the dense baseline (+1.2%) — if SRN wins, it's more convincing.
#
# Target hardware: RTX 5090 (32GB) with bf16
# Same training budget: 5B tokens on FineWeb-Edu
# Effective batch: micro_batch(4) × accum_steps(8) × seq_len(2048) = 65,536 tokens/step

train:
  seed: 42
  model_type: dense
  max_lr: 0.00015
  min_lr: 0.000015
  weight_decay: 0.1
  max_grad_norm: 1.0
  precision: bf16
  micro_batch: 4
  accum_steps: 8
  seq_len: 2048
  max_steps: 76000
  warmup_steps: 5000
  eval_interval: 5000
  eval_batches: 20
  log_interval: 100
  checkpoint_dir: checkpoints/dense-411m

model:
  max_seq_len: 2048
  d_model: 1152
  n_layers: 22
  n_heads: 16
  d_ff: 4608
  dropout: 0.1
  bias: false

dataset_backend: memmap
tokenizer_backend: bpe
tokenizer_path: data/fineweb-edu/tokenizer.json
tokenizer_vocab_size: 50257
train_tokens_path: data/fineweb-edu/train_tokens.bin
val_tokens_path: data/fineweb-edu/val_tokens.bin
