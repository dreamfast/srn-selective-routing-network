train:
  max_steps: 5000
  micro_batch: 16
  accum_steps: 2
  seq_len: 256
  max_lr: 0.0003
  min_lr: 0.00003
  weight_decay: 0.1
  warmup_steps: 100
  max_grad_norm: 1.0
  eval_interval: 250
  eval_batches: 20
  log_interval: 10
  checkpoint_dir: checkpoints
  seed: 42

model:
  max_seq_len: 256
  d_model: 512
  d_compressed: 128
  n_layers: 8
  n_memory_slots: 64
  n_experts: 8
  top_k_experts: 2
  d_expert: 256
  n_heads_route: 4
  dropout: 0.1
  causal_window: 32
  csp_internal_residual: false
  aux_loss_weight: 0.01
