# Exp0-T: Transformer 152M Baseline — 2060 config
# Parameter-matched dense Transformer for quality gap measurement

dataset_backend: memmap
tokenizer_backend: bpe
tokenizer_path: data/tinystories/tokenizer.json
tokenizer_vocab_size: 32000
train_tokens_path: data/tinystories/train_tokens.bin
val_tokens_path: data/tinystories/val_tokens.bin

train:
  seed: 42
  model_type: dense
  micro_batch: 1
  accum_steps: 32
  seq_len: 512
  max_steps: 5000
  warmup_steps: 500
  max_lr: 0.0003
  min_lr: 0.00003
  weight_decay: 0.1
  max_grad_norm: 1.0
  precision: fp16
  eval_interval: 250
  eval_batches: 10
  log_interval: 25
  checkpoint_dir: checkpoints/exp0-transformer-2060

model:
  max_seq_len: 1024
  d_model: 896
  n_layers: 16
  n_heads: 16
  d_ff: 3584
  dropout: 0.1
  bias: false
