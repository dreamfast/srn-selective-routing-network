# Exp0-T-small: Transformer 112M (Compute-Fair) — 5090 config
# Matches SRN's active params/token to decompose compute vs architecture gap

dataset_backend: memmap
tokenizer_backend: bpe
tokenizer_path: data/tinystories/tokenizer.json
tokenizer_vocab_size: 32000
train_tokens_path: data/tinystories/train_tokens.bin
val_tokens_path: data/tinystories/val_tokens.bin

train:
  seed: 42
  model_type: dense
  micro_batch: 16
  accum_steps: 6
  seq_len: 1024
  max_steps: 5000
  warmup_steps: 500
  max_lr: 0.0003
  min_lr: 0.00003
  weight_decay: 0.1
  max_grad_norm: 1.0
  precision: fp16
  eval_interval: 250
  eval_batches: 20
  log_interval: 25
  checkpoint_dir: checkpoints/exp0-transformer-small-5090

model:
  max_seq_len: 1024
  d_model: 640
  n_layers: 16
  n_heads: 10
  d_ff: 2624
  dropout: 0.1
  bias: false
