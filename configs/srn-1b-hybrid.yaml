# SRN 1B Hybrid — Production config for FineWeb-Edu scaling run
#
# Architecture decisions from 150M ablation experiments:
#   - Hybrid attention every 4th layer (Exp1: 95% gap closure)
#   - Top-k 4 experts (Exp5+Exp7: stacks with hybrid)
#   - 96 memory slots (Exp2a/2b: more slots doesn't help)
#   - CSP bottleneck enabled (Exp4: removing it hurts)
#   - No WCSG offset (Exp6: hurts performance)
#
# Total params: ~957M | Active/token: ~485M (50.6%)
# 5 attention layers (0,4,8,12,16) + 15 routing layers
#
# Target hardware: RTX 5090 (32GB) with bf16
# Estimated training time: ~5-7 days for 10B tokens

train:
  seed: 42
  max_lr: 0.00015
  min_lr: 0.000015
  weight_decay: 0.1
  max_grad_norm: 1.0
  precision: bf16
  micro_batch: 2
  accum_steps: 16
  seq_len: 2048
  max_steps: 153000
  warmup_steps: 5000
  eval_interval: 5000
  eval_batches: 20
  log_interval: 100
  checkpoint_dir: checkpoints/srn-1b-hybrid

model:
  max_seq_len: 2048
  d_model: 1536
  d_compressed: 384
  n_layers: 20
  n_memory_slots: 96
  n_experts: 16
  top_k_experts: 4
  d_expert: 640
  n_heads_route: 16
  dropout: 0.1
  causal_window: 128
  csp_internal_residual: false
  aux_loss_weight: 0.01
  attention_every_n_layers: 4
  attention_n_heads: 16
  sparse_moe: true

dataset_backend: memmap
tokenizer_backend: bpe
tokenizer_path: data/fineweb-edu/tokenizer.json
tokenizer_vocab_size: 50257
train_tokens_path: data/fineweb-edu/train_tokens.bin
val_tokens_path: data/fineweb-edu/val_tokens.bin
